name: Trivy scan

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Tags"
        type: string
        required: false
        default: "latest"

jobs:
  scan:
    name: Trivy scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      #- name: Checkout
      #  uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      #  with:
      #    fetch-depth: 0

      - id: auth
        name: Authenticate with Google Cloud
        uses: google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935 #v2.1.8
        with:
          token_format: access_token
          workload_identity_provider: 'projects/143095095586/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-actions-provider'
          service_account: 'github-actions@flowxai.iam.gserviceaccount.com'
          access_token_lifetime: 4600s
          create_credentials_file: true
          cleanup_credentials: true

      - name: Login to Artifact Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 #v3.3.0
        with:
          registry: europe-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: repo
        run: |
          echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 #0.29.0
        with:
          image-ref: 'europe-docker.pkg.dev/flowxai/dev/${{ steps.repo.outputs.name }}:${{ inputs.tags }}'
          #format: 'table'
          format: 'template'
          template: "@$HOME/.local/bin/trivy-bin/contrib/html.tpl"
          output: vuln-scan-${{ steps.repo.outputs.name }}-${{ inputs.tags }}.html
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 #v4.4.3
        with:
          name: vuln-scan-${{ steps.repo.outputs.name }}-${{ inputs.tags }}.html
          path: vuln-scan-${{ steps.repo.outputs.name }}-${{ inputs.tags }}.html
          retention-days: 30
