---
name: Pylint

on: # yamllint disable-line rule:truthy
  pull_request: null

permissions:
  contents: read
  packages: read
  id-token: 'write'

jobs:
  build:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      - name: Set up Python 3.12.9
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 #v5.4.0
        with:
            python-version: 3.12.9

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pylint-actions
            pip install pylint

      - id: auth
        name: Authenticate with Google Cloud
        uses: google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935 #v2.1.8
        with:
          token_format: access_token
          workload_identity_provider: 'projects/143095095586/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-actions-provider'
          service_account:  'github-actions@flowxai.iam.gserviceaccount.com'
          access_token_lifetime: 4600s
          create_credentials_file: true
          cleanup_credentials: true

      - name: Login to Artifact Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 #v3.3.0
        with:
          registry: europe-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Install Poetry
        if: ${{ hashFiles('pyproject.toml') != '' }}
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a #v1.4.1
        with:
          virtualenvs-create: false

      - name: Install dependencies
        run: |
          poetry self add keyrings.google-artifactregistry-auth
          poetry install

      - name: Analyzing the code with pylint-actions
        run: |
          python -m pylint --load-plugins pylint_actions --output-format=actions .
