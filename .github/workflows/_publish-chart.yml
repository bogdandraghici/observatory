name: Publish Helm Chart to Harbor

on:
  workflow_call:
    inputs:
      app_version:
        description: 'Application version'
        required: true
        type: string
      repo_name:
        description: 'Repo name'
        required: true
        type: string
      harbor_chart_registry:
        description: 'Chart Registry'
        required: true
        type: string
      harbor_chart_project:
        description: 'Chart Project'
        required: true
        type: string
      artifact_registry:
        description: 'Image Registry'
        required: true
        type: string
      artifact_registry_images:
        description: 'Image Registry Project'
        required: true
        type: string
      artifact_registry_charts:
        description: 'Image Registry Project'
        required: true
        type: string
      commit_helm_values:
        description: 'Commit values.yml changes'
        required: false
        type: string
        default: 'false'
      gcp_workload_identity_provider:
        description: "GCP Workload Identity Provider"
        required: true
        type: string
      gcp_service_account:
        description: "GCP Service Account"
        required: true
        type: string
      cosign_tlog_upload:
        description: 'Decide if we want to upload to Rekor'
        required: false
        type: string
        default: 'false'
      cosign_ignore_tlog:
        description: 'Ignore missing Rekor record'
        required: false
        type: string
        default: 'true'

    outputs:
      commit_hash:
        description: "App Version"
        value: ${{ jobs.chart.outputs.commit_hash }}

jobs:
  chart:
    runs-on: ubuntu-24.04
    outputs:
      commit_hash: ${{ steps.commit_values.outputs.commit_hash }}
    steps:
    - name: Get Token
      id: get_workflow_token
      uses: peter-murray/workflow-application-token-action@d17e3a9a36850ea89f35db16c1067dd2b68ee343 #4.0.1
      with:
        application_id: ${{ vars.APPLICATION_ID }}
        application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
        revoke_token: true

    - name: Check out code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      with:
        token: ${{ steps.get_workflow_token.outputs.token }}

    - name: Add Harbor
      if: >-
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/heads/release/')
      run: |
        helm repo add ${{ inputs.harbor_chart_project}} --username ${{ vars.HARBOR_USERNAME }} --password '${{ secrets.HARBOR_PASSWORD }}' ${{ inputs.harbor_chart_registry}}/${{ inputs.harbor_chart_project }}

    - name: Update Dependencies for Helm Chart
      run: |
        helm dependency update charts/${{ inputs.repo_name }}

    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 #v3.0.2
      id: changes
      with:
        filters: |
          overwrite:
            - 'charts/*/values-common.yaml'
            - 'charts/*/values-overwrite.yaml'

    - name: Overwrite common values
      if: steps.changes.outputs.overwrite == 'true'
      run: |
        #overwrite values.yaml
        pip install -r .github/yaml-merger-py/requirements.txt
        python .github/yaml-merger-py/yaml-merger.py charts/*/values-common.yaml charts/*/values-overwrite.yaml > charts/*/values.yaml

    - name: Commit changes
      if: steps.changes.outputs.overwrite == 'true'
      uses: stefanzweifel/git-auto-commit-action@e348103e9026cc0eee72ae06630dbe30c8bf7a79 #v5.1.0
      with:
        commit_message: '[skip ci] generated values.yaml'

    - name: Configure default values.yaml
      run: |
        #values.yaml
        yq -i '.image.tag = "${{ inputs.app_version}}"' charts/*/values.yaml
        yq -i '.image.repository = "${{ inputs.artifact_registry}}/${{ inputs.artifact_registry_images }}/${{ inputs.repo_name}}"' charts/*/values.yaml
        yq -i '.commonLabels."app.kubernetes.io/version" = "${{ inputs.app_version}}"' charts/*/values.yaml
        yq -i '.commonLabels."app.kubernetes.io/release" = "${{ inputs.app_version}}"' charts/*/values.yaml
        yq -i '.podLabels."app.kubernetes.io/version" = "${{ inputs.app_version}}"' charts/*/values.yaml
        yq -i '.podLabels."app.kubernetes.io/release" = "${{ inputs.app_version}}"' charts/*/values.yaml

        #Chart.yaml
        yq -i '.version = "${{ inputs.app_version}}"' charts/*/Chart.yaml
        yq -i '.appVersion = "${{ inputs.app_version}}"' charts/*/Chart.yaml

    - name: Update version in values-overwrite.yaml
      if: steps.changes.outputs.overwrite == 'true'
      run: |
        #values-overwrite.yaml
        #so we  don't generated diff with main for these values
        yq -i '.image.tag = "${{ inputs.app_version}}"' charts/*/values-overwrite.yaml
        yq -i '.image.repository = "${{ inputs.artifact_registry}}/${{ inputs.artifact_registry_images }}/${{ inputs.repo_name}}"' charts/*/values-overwrite.yaml
        yq -i '.commonLabels."app.kubernetes.io/version" = "${{ inputs.app_version}}"' charts/*/values-overwrite.yaml
        yq -i '.commonLabels."app.kubernetes.io/release" = "${{ inputs.app_version}}"' charts/*/values-overwrite.yaml
        yq -i '.podLabels."app.kubernetes.io/version" = "${{ inputs.app_version}}"' charts/*/values-overwrite.yaml
        yq -i '.podLabels."app.kubernetes.io/release" = "${{ inputs.app_version}}"' charts/*/values-overwrite.yaml

    - name: Commit changes
      if: ${{ fromJSON(inputs.commit_helm_values) }}
      id: commit_values
      uses: stefanzweifel/git-auto-commit-action@e348103e9026cc0eee72ae06630dbe30c8bf7a79 #v5.1.0
      with:
        commit_message: '[skip ci] update values.yaml'

    - name: Package Helm Chart
      run: |
        helm package charts/${{ inputs.repo_name }}

    - name: Install Helm Push
      if: >-
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/heads/release/')
      run: |
        helm plugin install https://github.com/chartmuseum/helm-push.git

    - name: Push Chart to Harbor
      if: >-
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/heads/release/')
      env:
        HARBOR_USERNAME: ${{ vars.HARBOR_USERNAME }}
        HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
      run: |
        helm cm-push ./${{ inputs.repo_name }}-*.tgz ${{ inputs.harbor_chart_project }}

    - id: auth
      name: Authenticate with Google Cloud
      uses: google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935 #v2.1.8
      with:
        token_format: access_token
        workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
        service_account: ${{ inputs.gcp_service_account }}
        access_token_lifetime: 1800s

    - name: Login to Artifact Registry
      uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 #v3.3.0
      with:
        registry: europe-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Helm Push to OCI
      run: |
        helm push ./${{ inputs.repo_name }}-${{ inputs.app_version}}.tgz oci://${{ inputs.artifact_registry }}/${{ inputs.artifact_registry_charts}}

    - name: Notify message
      run: |
        echo "::notice title=Version::${{ inputs.app_version }}"

    - name: Setup Crane
      uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e #v0.4
      with:
        version: v0.19.0

    - name: Get Digest
      run: |
        echo "CHART_DIGEST=$(crane digest  ${{ inputs.artifact_registry }}/${{ inputs.artifact_registry_charts }}/${{ inputs.repo_name }}:${{ inputs.app_version }})" >> $GITHUB_ENV

    - name: Install cosign
      uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a #3.8.1

    - name: Keyless signing of chart
      env:
        CHART_DIGEST: ${{ env.CHART_DIGEST }}
      run: |
        echo cosign sign --yes  ${{ inputs.artifact_registry }}/${{ inputs.artifact_registry_charts }}/${{ inputs.repo_name }}@${{ env.CHART_DIGEST }} --tlog-upload=${{ inputs.cosign_tlog_upload }}

    - name: Verify the chart
      env:
        CHART_DIGEST: ${{ env.CHART_DIGEST }}
      run: |
        echo cosign verify --insecure-ignore-tlog=${{ inputs.cosign_ignore_tlog }} ${{ inputs.artifact_registry }}/${{ inputs.artifact_registry_charts }}/${{ inputs.repo_name }}@${{ env.CHART_DIGEST }} \
          --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/_publish-chart.yml@refs/(heads|pull)/(main|\d*)" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" 
        # | jq .
