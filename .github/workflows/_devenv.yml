name: Devenv

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Application name'
        required: true
        type: string
      app_version:
        description: 'Application version'
        required: true
        type: string
      label:
        description: 'Label'
        required: true
        type: string

permissions:
  actions: read
  contents: read
  repository-projects: read
  pull-requests: write
  id-token: write
  statuses: read
  checks: read

jobs:
  checkout-repo:
    runs-on: ubuntu-24.04
    steps:
    - name: echo label
      run:
        echo "Labels ${{ inputs.label }}"

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: vars
      id: vars
      run: |
        # extract env repo name, branch name and devenv pr from labels

        # devenv/academyenv/demoenv
        env_type=$(echo ${{ inputs.label }} | tr '[:upper:]' '[:lower:]' | awk -F"/" '{print $1}' | awk -F"-" '{print $2}')

        # dev-environments
        env_repo_name="${env_type%env}-environments"
        echo "env_repo_name=${env_repo_name}" | tee -a $GITHUB_OUTPUT $GITHUB_ENV


        # versioning-with-timer-events
        env_branch=$(echo ${{ inputs.label }} | awk -F"/" '{print $2}')
        echo "env_branch=${env_branch}"  | tee -a $GITHUB_OUTPUT $GITHUB_ENV

        echo "I will deploy ${{ inputs.app_name }}:${{ inputs.app_version }} in https://github.com/${{ github.repository_owner }}/${env_repo_name}/tree/${env_branch}"

    - name: Get Token
      id: get_workflow_token
      uses: peter-murray/workflow-application-token-action@d17e3a9a36850ea89f35db16c1067dd2b68ee343 #4.0.1
      with:
        application_id: ${{ vars.APPLICATION_ID }}
        application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
        revoke_token: true

    - name: Check out environment repo
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #v4.1.7
      with:
        token: ${{ steps.get_workflow_token.outputs.token }}
        repository: flowx-ai/${{ steps.vars.outputs.env_repo_name }}
        path: ${{ steps.vars.outputs.env_repo_name }}
        ref: ${{ steps.vars.outputs.env_branch }}

    - name: Download Artifact
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: devenv-${{ steps.vars.outputs.env_branch }}
        path: ${{ steps.vars.outputs.env_repo_name }}

    - name: Configure instance
      env:
        GH_TOKEN: ${{ steps.get_workflow_token.outputs.token }}
      working-directory: ${{ steps.vars.outputs.env_repo_name }}
      run: |
        export APP_NAME='${{ inputs.app_name }}'

        yq -i '.flowxAI.services.[env(APP_NAME)].version = "${{ inputs.app_version}}"' env.yaml
        cat env.yaml

        # add component label in devenv PR
        component_label="${APP_NAME}/PR_${{ github.event.pull_request.number }}"

        echo "Create label for remote env"
        gh label create --color E99695 --force "${component_label}"

        echo "Add label to env pr"
        gh pr edit --add-label "${component_label}"

        echo "Building a multiline commit message"
        echo "Deploying snapshot version ${{inputs.app_name}}:${{ inputs.app_version}}" >> commitmessage.txt

        env_pr=$(gh pr list -R flowx-ai/${{ steps.vars.outputs.env_repo_name }} --head ${{ steps.vars.outputs.env_branch }} --json number --jq '.[].number')
        echo $env_pr
        source ./env_config.sh
        DOMAIN=$(yq e ".clusters | map(select(.name == \"$DEFAULT_CLUSTER\")).[].domain" ./clusters.yaml)
        if [[ "x$INGRESS_SUBDOMAIN_SUFFIX" =~ ^xpr ]]; then
          INGRESS_SUBDOMAIN_SUFFIX="-pr${env_pr}"
        fi
        DESIGNER_HOST="${DEPLOY_INSTANCE_NAME}${INGRESS_SUBDOMAIN_SUFFIX}.${DOMAIN}"
        DEMO_APP_HOST="demo${INGRESS_SUBDOMAIN_SUFFIX}.${DOMAIN}"
        AUTH_HOST="auth${INGRESS_SUBDOMAIN_SUFFIX}.${DOMAIN}"

        DEPLOY_STATUS="https://dashboard-jx.cicd.flowxai.dev/flowx-ai/${{ steps.vars.outputs.env_repo_name }}/PR-${env_pr}"

        local_pr_comment="I will deploy ${{ github.repository }}:${{ inputs.app_version }} in https://github.com/${{ github.repository_owner }}/${{ steps.vars.outputs.env_repo_name }}/tree/${{ steps.vars.outputs.env_branch }}<br />"
        status_message="https://github.com/flowx-ai/${{ steps.vars.outputs.env_repo_name }}/pull/${env_pr} ([deploy status](${DEPLOY_STATUS})) ([Designer](https://${DESIGNER_HOST}) / [DemoApp](https://${DEMOAPP_HOST}) / [Keycloak](https://${AUTH_HOST}))"

        echo "Add details in local PR"
        git remote -v
        cd ../
        gh pr comment ${{ github.event.pull_request.number }} --body "${local_pr_comment} <br />- ${status_message}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: devenv-${{ steps.vars.outputs.env_branch }}
        path: |
          ${{ steps.vars.outputs.env_repo_name }}/commitmessage.txt
          ${{ steps.vars.outputs.env_repo_name }}/env.yaml
          ${{ steps.vars.outputs.env_repo_name }}/helmfile.yaml.gotmpl
        overwrite: true
