#Don't change this
image:
  repository: europe-docker.pkg.dev/flowxai/ai-docker-release/observatory-web
  tag: 1.0.11
commonLabels:
  app.kubernetes.io/release: 1.0.11
  app.kubernetes.io/version: 1.0.11
podLabels:
  app.kubernetes.io/release: 1.0.11
  app.kubernetes.io/version: 1.0.11
#Overwrites start here
mngt:
  service:
    annotations:
      prometheus.io/scrape: "false"
      flowx.ai/health: "true"
      flowx.ai/health-path: /healthcheck.json
      flowx.ai/health-port: "8081"
    ports:
      mngt:
        protocol: TCP
        port: 8081
        targetPort: 8081
livenessProbe:
  path: /
startupProbe:
  enabled: false
  path: /
readinessProbe:
  path: /
