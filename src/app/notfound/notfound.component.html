<div class="notfound-wrapper">
  <div class="notfound-bg">
    <div class="notfound-grid"></div>
    <div class="notfound-glow notfound-glow--1"></div>
    <div class="notfound-glow notfound-glow--2"></div>
  </div>

  <div class="notfound-content">
    <img src="assets/layout/images/observatory-light.svg" alt="FLOWX.AI" class="notfound-logo">

    <div class="notfound-code">404</div>
    <h1 class="notfound-title">Page not found</h1>
    <p class="notfound-subtitle">The page you're looking for doesn't exist or has been moved.</p>

    <div class="notfound-actions">
      <a [routerLink]="['/ai']" class="notfound-btn notfound-btn--primary">
        <i class="pi pi-home"></i>
        Go to Dashboard
      </a>
      <a [routerLink]="['/status']" class="notfound-btn notfound-btn--secondary">
        <i class="pi pi-server"></i>
        Platform Status
      </a>
    </div>

    <div class="notfound-links">
      <a href="https://observatory-docs.theta.flowxai.dev" target="_blank" rel="noopener" class="notfound-link">
        <i class="pi pi-book"></i>
        <span>Documentation</span>
        <i class="pi pi-external-link notfound-link__external"></i>
      </a>
      <span class="notfound-links__divider"></span>
      <a href="https://flowx.ai" target="_blank" rel="noopener" class="notfound-link">
        <i class="pi pi-globe"></i>
        <span>FLOWX.AI</span>
        <i class="pi pi-external-link notfound-link__external"></i>
      </a>
    </div>
  </div>
</div>
