<button
  class="layout-config-button p-link"
  type="button"
  (click)="onConfigButtonClick()"
  >
  <i class="pi pi-cog"></i>
</button>

<p-drawer
  [(visible)]="visible"
  position="right"
  [transitionOptions]="'.3s cubic-bezier(0, 0, 0.2, 1)'"
  styleClass="layout-config-sidebar w-20rem"
  >
  <h5>Scale</h5>
  <div class="flex items-center">
    <button
      icon="pi pi-minus"
      type="button"
      pButton
      (click)="decrementScale()"
      class="p-button-text p-button-rounded w-[2rem] h-[2rem] mr-2"
      [disabled]="scale === scales[0]"
    ></button>
    <div class="flex gap-2 items-center">
      @for (s of scales; track s) {
        <i
          class="pi pi-circle-fill text-surface-300"
          [ngClass]="{ 'text-primary-500': s === scale }"
        ></i>
      }
    </div>
    <button
      icon="pi pi-plus"
      type="button"
      pButton
      (click)="incrementScale()"
      class="p-button-text p-button-rounded w-[2rem] h-[2rem] ml-2"
      [disabled]="scale === scales[scales.length - 1]"
    ></button>
  </div>

  @if (!minimal) {
    <h5>Menu Type</h5>
    <div class="field-radiobutton">
      <p-radioButton
        name="menuMode"
        value="static"
        [(ngModel)]="menuMode"
        inputId="mode1"
      ></p-radioButton>
      <label for="mode1">Static</label>
    </div>
    <div class="field-radiobutton">
      <p-radioButton
        name="menuMode"
        value="overlay"
        [(ngModel)]="menuMode"
        inputId="mode2"
      ></p-radioButton>
      <label for="mode2">Overlay</label>
    </div>
  }

  @if (!minimal) {
    <h5>Input Style</h5>
    <div class="flex">
      <div class="field-radiobutton flex-1">
        <p-radioButton
          name="inputStyle"
          value="outlined"
          [(ngModel)]="inputStyle"
          inputId="outlined_input"
        ></p-radioButton>
        <label for="outlined_input">Outlined</label>
      </div>
      <div class="field-radiobutton flex-1">
        <p-radioButton
          name="inputStyle"
          value="filled"
          [(ngModel)]="inputStyle"
          inputId="filled_input"
        ></p-radioButton>
        <label for="filled_input">Filled</label>
      </div>
    </div>
    <h5>Ripple Effect</h5>
    <p-inputSwitch [(ngModel)]="ripple"></p-inputSwitch>
  }

  <ng-container>
    <h5>Dark Mode</h5>
    <p-inputSwitch [(ngModel)]="darkMode" (onChange)="onDarkModeChange($event)"></p-inputSwitch>
  </ng-container>
  @if (!minimal) {
    <h5>Themes</h5>
    <div class="grid grid-cols-12">
      <div class="col-span-6">
        <button class="h-[2rem]" (click)="changeTheme('flowx-light', 'light')">
          Light Mode
        </button>
      </div>
      <div class="col-span-6">
        <button class="h-[2rem]" (click)="changeTheme('flowx-dark', 'dark')">
          Dark Mode
        </button>
      </div>
    </div>
  }
</p-drawer>
