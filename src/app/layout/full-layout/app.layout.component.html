<div class="layout-wrapper" [ngClass]="containerClass">
    <app-topbar></app-topbar>
    <div class="layout-sidebar">
        <app-sidebar [section]="aiSection"></app-sidebar>
    </div>
    <div class="layout-main-container">
        <div class="layout-main">
            <router-outlet></router-outlet>
        </div>
        <app-footer></app-footer>
    </div>

    <div class="layout-mask"></div>

    <app-assistant-fab [isOpen]="assistantOpen" (fabToggle)="assistantOpen = !assistantOpen"></app-assistant-fab>
    <app-chat-window [isOpen]="assistantOpen" (toggleOpen)="assistantOpen = !assistantOpen"></app-chat-window>
</div>
