<div class="ai-page">
  <!-- Page Header -->
  <header class="page-header">
    <div class="page-header__left">
      <h1 class="page-header__title">Dashboard</h1>
      <p class="page-header__subtitle">Monitor your AI application metrics</p>
    </div>
    <div class="page-header__right">
      <p-selectButton
        [options]="periods"
        [(ngModel)]="selectedPeriod"
        [multiple]="false"
        optionLabel="name"
        optionValue="value"
      ></p-selectButton>
    </div>
  </header>

  <!-- Filters Bar -->
  <div class="filters-bar">
    <div class="filters-bar__left">
      <div class="filter-group">
        <label class="filter-group__label">Organization</label>
        <p-select
          [options]="orgs"
          [(ngModel)]="selectedOrg"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="orgChanged($event)"
          placeholder="Select Organization"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Workspace</label>
        <p-select
          [options]="workspaces"
          [(ngModel)]="selectedWorkspace"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          (onChange)="workspaceChanged($event)"
          placeholder="All Workspaces"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Project</label>
        <p-select
          [options]="apps"
          [(ngModel)]="selectedApp"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="appChanged($event)"
          placeholder="Select Project"
        ></p-select>
      </div>
    </div>
  </div>

  <!-- Widgets -->
  <div class="grid grid-cols-12 items-stretch gap-4">
    <div class="col-span-12 md:col-span-12 lg:col-span-6 xl:col-span-6 self-stretch ">
      <llm-usage-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></llm-usage-widget>
    </div>

    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <agent-usage-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></agent-usage-widget>
    </div>
    <div class="col-span-12 lg:col-span-12 xl:col-span-12">
      <tokens-usage-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></tokens-usage-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <error-rate-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></error-rate-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <model-performance-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></model-performance-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <cost-trend-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></cost-trend-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <correctness-overview-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></correctness-overview-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <regulatory-verdicts-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></regulatory-verdicts-widget>
    </div>
  </div>
</div>
