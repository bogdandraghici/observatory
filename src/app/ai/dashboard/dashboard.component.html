<div class="ai-page dashboard-page">
  <!-- Hero Panel — title band + period scope + filters band -->
  <section class="dashboard-hero">
    <div class="dashboard-hero__band">
      <div class="dashboard-hero__text">
        <h1 class="dashboard-hero__title">Dashboard</h1>
        <p class="dashboard-hero__subtitle">Monitor your AI application metrics across the selected period.</p>
      </div>
      <div class="dashboard-hero__scope">
        <p-selectButton
          [options]="periods"
          [(ngModel)]="selectedPeriod"
          [multiple]="false"
          [allowEmpty]="false"
          optionLabel="name"
          optionValue="value"
        ></p-selectButton>
      </div>
    </div>

    <div class="dashboard-hero__filters">
      <div class="filter-group">
        <label class="filter-group__label">Organization</label>
        <p-select
          [options]="orgs"
          [(ngModel)]="selectedOrg"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="orgChanged($event)"
          placeholder="Select Organization"
          appendTo="body"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Workspace</label>
        <p-select
          [options]="workspaces"
          [(ngModel)]="selectedWorkspace"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          (onChange)="workspaceChanged($event)"
          placeholder="All Workspaces"
          appendTo="body"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Project</label>
        <p-select
          [options]="apps"
          [(ngModel)]="selectedApp"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="appChanged($event)"
          placeholder="Select Project"
          appendTo="body"
        ></p-select>
      </div>
    </div>
  </section>

  <!-- Widgets -->
  <div class="dashboard-widgets">
    <div class="col-span-12 md:col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <llm-usage-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></llm-usage-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <agent-usage-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></agent-usage-widget>
    </div>
    <div class="col-span-12 lg:col-span-12 xl:col-span-12">
      <tokens-usage-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></tokens-usage-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <error-rate-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></error-rate-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <model-performance-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></model-performance-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <cost-trend-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></cost-trend-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <correctness-overview-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></correctness-overview-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <regulatory-verdicts-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></regulatory-verdicts-widget>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
      <regulatory-drift-widget
        [hours]="selectedPeriod"
        [appId]="selectedApp"
      ></regulatory-drift-widget>
    </div>
  </div>
</div>
