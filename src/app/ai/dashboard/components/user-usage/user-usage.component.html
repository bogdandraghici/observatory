<div class="card mb-0 user-usage">
    <div class="flex justify-between mb-4">
        <div class="flex flex-row items-center">
            <i class="pi pi-users mr-2"></i>
            <span class="block text-xl font-bold">Users</span>
        </div>
    </div>
    <div class="flex justify-between mb-4">
        <div>
            <span class="text-5xl font-bold mb-4">{{totalUsers | shortNumber}}</span><span class="font-normal ml-2">users</span>
        </div>

    </div>
    <p-table [value]="models" [rows]="4" [scrollable]="true" scrollHeight="240px">
        <ng-template pTemplate="header">
            <tr>
                <th>Users</th>
                <th>Runs</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-model>
            <tr >
                <td class="font-bold">
                    <p-avatar [label]="model.email[0]" styleClass="mr-2" size="normal" shape="circle"></p-avatar>
                    {{model.name}}
                </td >
                <td class="text-lg font-bold">{{ model.runs | shortNumber }}</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="3">
                <empty-state-widget message="No data found."></empty-state-widget>
              </td>
            </tr>
          </ng-template>
    </p-table>
</div>
