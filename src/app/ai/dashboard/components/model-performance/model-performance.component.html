<div class="stat-card model-performance" style="flex-direction: column; align-items: stretch;">
  <div class="flex items-center gap-3 mb-3">
    <div class="stat-card__icon">
      <i class="pi pi-gauge"></i>
    </div>
    <span class="stat-card__title">Model Performance</span>
  </div>
  <div class="flex justify-between mb-4">
    <div>
      <span class="stat-card__value--lg">{{ totalModels }}</span>
      <span class="stat-card__label ml-2">models</span>
    </div>
  </div>
  <p-table [value]="models" [rows]="4" [scrollable]="true" scrollHeight="240px">
    <ng-template pTemplate="header">
      <tr>
        <th>Model</th>
        <th>p50</th>
        <th>p95</th>
        <th>Error Rate</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-model>
      <tr>
        <td class="text-sm font-semibold" style="max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" [title]="model.model">{{ model.model }}</td>
        <td class="text-sm">{{ formatLatency(model.p50_latency_ms) }}</td>
        <td class="text-sm">{{ formatLatency(model.p95_latency_ms) }}</td>
        <td>
          <p-tag
            [severity]="getErrorSeverity(model.error_rate)"
            [value]="getErrorLabel(model.error_rate)"
          ></p-tag>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4">
          <empty-state-widget message="No data found."></empty-state-widget>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
