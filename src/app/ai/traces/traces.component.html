<div class="ai-page">
  <!-- A. Hero panel — title band (with period segmented control) + filters band -->
  <section class="traces-hero">
    <div class="traces-hero__band">
      <div class="traces-hero__text">
        <h1 class="traces-hero__title">Traces</h1>
        <p class="traces-hero__subtitle">Track and debug execution traces.</p>
      </div>

      <div class="traces-hero__scope">
        <p-selectButton
          [options]="periods"
          [(ngModel)]="selectedPeriod"
          [multiple]="false"
          optionLabel="name"
          optionValue="value"
        ></p-selectButton>
      </div>
    </div>

    <div class="traces-hero__filters">
      <div class="filter-group">
        <label class="filter-group__label">Organization</label>
        <p-select
          [options]="orgs"
          [(ngModel)]="selectedOrg"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="orgChanged($event)"
          placeholder="Select Organization"
          appendTo="body"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Workspace</label>
        <p-select
          [options]="workspaces"
          [(ngModel)]="selectedWorkspace"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          (onChange)="workspaceChanged($event)"
          placeholder="All Workspaces"
          appendTo="body"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Project</label>
        <p-select
          [options]="apps"
          [(ngModel)]="selectedApp"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="appChanged($event)"
          placeholder="Select Project"
          appendTo="body"
        ></p-select>
      </div>
    </div>
  </section>

  <!-- B. Traces table widget -->
  <traces-list-widget
    [appId]="selectedApp"
    [hours]="selectedPeriod"
  ></traces-list-widget>
</div>
