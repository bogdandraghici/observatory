<div class="ai-page">
  <!-- A. Hero panel — title band (with period segmented control) + filters band -->
  <section class="llm-hero">
    <div class="llm-hero__band">
      <div class="llm-hero__text">
        <h1 class="llm-hero__title">LLM Calls</h1>
        <p class="llm-hero__subtitle">Monitor and analyze your LLM API calls.</p>
      </div>

      <div class="llm-hero__scope">
        <p-selectButton
          [options]="periods"
          [(ngModel)]="selectedPeriod"
          [multiple]="false"
          optionLabel="name"
          optionValue="value"
          styleClass="period-selector"
        ></p-selectButton>
      </div>
    </div>

    <div class="llm-hero__filters">
      <div class="filter-group">
        <label class="filter-group__label">Organization</label>
        <p-select
          [options]="orgs"
          [(ngModel)]="selectedOrg"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="orgChanged($event)"
          placeholder="Select Organization"
          styleClass="filter-dropdown"
          appendTo="body"
        ></p-select>
      </div>

      <div class="filter-group">
        <label class="filter-group__label">Workspace</label>
        <p-select
          [options]="workspaces"
          [(ngModel)]="selectedWorkspace"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          (onChange)="workspaceChanged($event)"
          placeholder="All Workspaces"
          styleClass="filter-dropdown"
          appendTo="body"
        ></p-select>
      </div>

      <div class="filter-group">
        <label class="filter-group__label">Project</label>
        <p-select
          [options]="apps"
          [(ngModel)]="selectedApp"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="appChanged($event)"
          placeholder="Select Project"
          styleClass="filter-dropdown"
          appendTo="body"
        ></p-select>
      </div>
    </div>
  </section>

  <!-- B. LLM Calls table widget (unchanged) -->
  <llmcalls-list-widget
    [appId]="selectedApp"
    [hours]="selectedPeriod"
    [datasets]="datasets"
    [currentApp]="currentApp"
  ></llmcalls-list-widget>

</div>
