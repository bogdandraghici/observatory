<div class="ai-page">
  <!-- Page Header -->
  <header class="page-header">
    <div class="page-header__left">
      <h1 class="page-header__title">LLM Calls</h1>
      <p class="page-header__subtitle">Monitor and analyze your LLM API calls</p>
    </div>

    <div class="page-header__right">
      <p-selectButton
        [options]="periods"
        [(ngModel)]="selectedPeriod"
        [multiple]="false"
        optionLabel="name"
        optionValue="value"
        styleClass="period-selector"
      ></p-selectButton>
    </div>
  </header>

  <!-- Filters Bar -->
  <div class="filters-bar">
    <div class="filters-bar__left">
      <div class="filter-group">
        <label class="filter-group__label">Organization</label>
        <p-select
          [options]="orgs"
          [(ngModel)]="selectedOrg"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="orgChanged($event)"
          placeholder="Select Organization"
          styleClass="filter-dropdown"
        ></p-select>
      </div>

      <div class="filter-group">
        <label class="filter-group__label">Workspace</label>
        <p-select
          [options]="workspaces"
          [(ngModel)]="selectedWorkspace"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          (onChange)="workspaceChanged($event)"
          placeholder="All Workspaces"
          styleClass="filter-dropdown"
        ></p-select>
      </div>

      <div class="filter-group">
        <label class="filter-group__label">Project</label>
        <p-select
          [options]="apps"
          [(ngModel)]="selectedApp"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="appChanged($event)"
          placeholder="Select Project"
          styleClass="filter-dropdown"
        ></p-select>
      </div>
    </div>
  </div>

  <!-- LLM Calls Table -->
  <llmcalls-list-widget
    [appId]="selectedApp"
    [hours]="selectedPeriod"
    [datasets]="datasets"
    [currentApp]="currentApp"
  ></llmcalls-list-widget>

</div>
