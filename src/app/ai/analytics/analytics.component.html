<div class="ai-page analytics-page">
  <!-- A. Hero panel — title band (with period segmented control) + filters band -->
  <section class="analytics-hero">
    <div class="analytics-hero__band">
      <div class="analytics-hero__text">
        <h1 class="analytics-hero__title">API Calls</h1>
        <p class="analytics-hero__subtitle">Platform-wide API usage and performance.</p>
      </div>

      <div class="analytics-hero__scope">
        <p-selectButton
          [options]="periods"
          [(ngModel)]="selectedPeriod"
          [multiple]="false"
          (onChange)="periodChanged($event)"
          optionLabel="name"
          optionValue="value"
        ></p-selectButton>
      </div>
    </div>

    <div class="analytics-hero__filters">
      <div class="filter-group">
        <label class="filter-group__label">Service</label>
        <p-select
          [options]="agents"
          [(ngModel)]="selectedAgent"
          optionLabel="name"
          optionValue="value"
          [showClear]="true"
          (onChange)="agentChanged($event)"
          placeholder="All Services"
          appendTo="body"
        ></p-select>
      </div>
    </div>
  </section>

  <!-- B. Widgets grid (unchanged) -->
  <div class="grid grid-cols-12 items-stretch gap-4">
    @if (allMetrics?.length > 0) {
      <div
        class="col-span-12 lg:col-span-5 xl:col-span-5 grid grid-cols-12 self-start gap-4"
      >
        <div class="col-span-12 md:col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
          <single-value-widget
            [data]="allMetrics"
            [title]="'Requests'"
            [dataProperty]="'count_requests'"
            [value]="0"
            [trendValue]="0"
          ></single-value-widget>
        </div>
        <div class="col-span-12 md:col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
          <single-value-widget
            [data]="allMetrics"
            [useAvg]="true"
            [title]="'Users'"
            [dataProperty]="'count_users'"
            [value]="0"
            [trendValue]="0"
          ></single-value-widget>
        </div>
        <div class="col-span-12 md:col-span-12 lg:col-span-12 xl:col-span-12 self-stretch">
          <third-values-widget
            [data]="responseTimeMetrics"
            [title]="'Response Times'"
            [suffix]="'(ms)'"
            [values]="triple_values"
          ></third-values-widget>
        </div>
        <div class="col-span-12 md:col-span-12 lg:col-span-12 xl:col-span-12 self-stretch">
          <endpoints-widget
            [days]="selectedPeriod"
            [agent]="selectedAgent"
            [title]="'Endpoints'"
          ></endpoints-widget>
        </div>
      </div>
    }

    @if (allMetrics?.length > 0) {
      <div
        class="col-span-12 lg:col-span-7 xl:col-span-7 grid grid-cols-12 self-start gap-4"
      >
        <div class="col-span-12 md:col-span-12 lg:col-span-12 xl:col-span-12 self-stretch">
          <activity-widget
            [title]="'Activity'"
            [data]="allMetrics"
            [period]="selectedPeriod"
          ></activity-widget>
        </div>
        <div class="col-span-12 md:col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
          <usage-time-widget
            [title]="'Usage Time'"
            [days]="selectedPeriod"
            [agent]="selectedAgent"
          ></usage-time-widget>
        </div>
        <div class="col-span-12 md:col-span-12 lg:col-span-6 xl:col-span-6 self-stretch">
          <pie-value-widget
            [title]="'By Version'"
            [dataSource]="'version'"
            [days]="selectedPeriod"
            [agent]="selectedAgent"
            [position]="'top'"
            [chartType]="'pie'"
            [ratio]="1"
          ></pie-value-widget>
        </div>
        <div class="col-span-12 md:col-span-12 lg:col-span-12 xl:col-span-12 self-stretch">
          <pie-value-widget
            [title]="'By Service/Agent'"
            [dataSource]="'agent'"
            [days]="selectedPeriod"
            [position]="'left'"
            [chartType]="'bar'"
            [ratio]="3"
          ></pie-value-widget>
        </div>
      </div>
    }
  </div>
</div>
