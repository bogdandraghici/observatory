<div class="stat-card stat-card--stacked">
  <div class="card-head">
    <div class="card-title">
      <i class="pi pi-link"></i>
      {{ title }}
    </div>
    <p-selectButton
      [options]="stateTypes"
      [(ngModel)]="valueType"
      optionLabel="label"
      (onChange)="onStateChange($event)"
      optionValue="value"
    />
  </div>
  <p-chart
    type="bar"
    [data]="chartDataEndNo"
    [options]="chartOptionsEndNo"
    [plugins]="chartPlugins"
  ></p-chart>
</div>
