<div class="stat-card stat-card--stacked">
  <div class="card-head">
    <div class="card-title">
      <i class="pi pi-chart-pie"></i>
      {{ title }}
    </div>
    <p-selectButton
      [options]="chartTypes"
      [(ngModel)]="chartType"
      optionLabel="label"
      (onChange)="onTypeChange($event)"
      optionValue="value"
    />
  </div>
  @if (chartType === 'pie') {
    <p-chart
      type="pie"
      [data]="chartData"
      [options]="chartOptionsPie"
    ></p-chart>
  }
  @if (chartType === 'bar') {
    <p-chart
      type="bar"
      [data]="chartData"
      [options]="chartOptionsBar"
    ></p-chart>
  }
  <ul class="pie-legend">
    @for (item of legend; track item.label) {
      <li class="pie-legend__item">
        <span
          class="pie-legend__swatch"
          [style.background]="item.fill"
          [style.borderColor]="item.stroke"
        ></span>
        <span class="pie-legend__label">{{ item.label }}</span>
        <span class="pie-legend__count">{{ item.count | number }}</span>
      </li>
    }
  </ul>
</div>
