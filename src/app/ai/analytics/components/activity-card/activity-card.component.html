<div class="stat-card" style="flex-direction: column; align-items: stretch;">
  <div class="flex items-center gap-2 mb-3">
    <div class="stat-card__icon stat-card__icon--blue">
      <i class="pi pi-chart-line"></i>
    </div>
    <span class="stat-card__title">{{ title }}</span>
  </div>
  <p-chart
    type="line"
    [data]="chartDataReqNo"
    [options]="chartOptionsReqNo"
  ></p-chart>
  <p-chart
    type="line"
    [data]="chartDataReqTime"
    [options]="chartOptionsReqTime"
  ></p-chart>

  <div class="flex flex-col items-stretch">
    <p class="text-sm m-0 p-0 mt-2" style="color: var(--text-color-secondary);">Success Rate</p>
    <div class="flex w-full container">
      @for (item of [].constructor(period); track item; let i = $index) {
        <div
          class="flex items-center border success w-full"
        ></div>
      }
    </div>
  </div>
</div>
