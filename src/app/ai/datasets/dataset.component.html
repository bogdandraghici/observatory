<div class="ai-page">
  <!-- Page Header -->
  <header class="page-header">
    <div class="page-header__left">
      <h1 class="page-header__title">Datasets</h1>
      <p class="page-header__subtitle">Test data for evaluations</p>
    </div>
  </header>

  <!-- Filters Bar -->
  <div class="filters-bar">
    <div class="filters-bar__left">
      <div class="filter-group">
        <label class="filter-group__label">Organization</label>
        <p-select
          [options]="orgs"
          [(ngModel)]="selectedOrg"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="orgChanged($event)"
          placeholder="Select Organization"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Workspace</label>
        <p-select
          [options]="workspaces"
          [(ngModel)]="selectedWorkspace"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          (onChange)="workspaceChanged($event)"
          placeholder="All Workspaces"
        ></p-select>
      </div>
    </div>
  </div>

  <!-- Content -->
  <dataset-list-widget
    [orgId]="selectedOrg"
    (addDataset)="showDialogDataset()"
  ></dataset-list-widget>
</div>

<!-- Add Dataset Dialog -->
<p-dialog
  [(visible)]="visibleDataset"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  [closeOnEscape]="true"
  styleClass="flowx-modal flowx-modal--s"
  [style]="{width: '600px'}"
>
  <ng-template pTemplate="header">
    <div class="flowx-modal__header-stack">
      <h2 class="flowx-modal__title">New Dataset</h2>
      <p class="flowx-modal__subtitle">Create a dataset to group related records for evaluation runs</p>
    </div>
  </ng-template>

  <div class="flowx-modal__body">
    <div class="flowx-modal__field">
      <span class="flowx-modal__field-label">Dataset Name</span>
      <input pInputText pSize="small" [(ngModel)]="newDatasetName" placeholder="Enter dataset name" />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flowx-modal__footer-actions">
      <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="closeDialogDataset()"></p-button>
      <p-button label="Save" (click)="saveDataset()"></p-button>
    </div>
  </ng-template>
</p-dialog>
