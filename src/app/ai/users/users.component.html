<div class="ai-page users-page">
  <!-- A. Hero panel — title band + filters band -->
  <section class="users-hero">
    <div class="users-hero__band">
      <div class="users-hero__text">
        <h1 class="users-hero__title">Users</h1>
        <p class="users-hero__subtitle">See who is talking to your agents and how often.</p>
      </div>
      <div class="users-hero__scope">
        <p-selectButton
          [options]="periods"
          [(ngModel)]="selectedPeriod"
          [multiple]="false"
          optionLabel="name"
          optionValue="value"
        ></p-selectButton>
      </div>
    </div>

    <div class="users-hero__filters">
      <div class="filter-group">
        <label class="filter-group__label">Organization</label>
        <p-select
          [options]="orgs"
          [(ngModel)]="selectedOrg"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="orgChanged($event)"
          placeholder="Select Organization"
          appendTo="body"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Workspace</label>
        <p-select
          [options]="workspaces"
          [(ngModel)]="selectedWorkspace"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          (onChange)="workspaceChanged($event)"
          placeholder="All Workspaces"
          appendTo="body"
        ></p-select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">Project</label>
        <p-select
          [options]="apps"
          [(ngModel)]="selectedApp"
          optionLabel="name"
          optionValue="id"
          [showClear]="false"
          (onChange)="appChanged($event)"
          placeholder="Select Project"
          appendTo="body"
        ></p-select>
      </div>
    </div>
  </section>

  <!-- B. Content -->
  <users-list-widget
    [appId]="selectedApp"
    [hours]="selectedPeriod"
  ></users-list-widget>
</div>
