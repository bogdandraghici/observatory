<!doctype html>
<html lang="en" class="flowx-light">
  <head>
    <meta charset="utf-8" />
    <title>FLOWX.AI Observatory</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16x16.png"
    />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <link
      rel="mask-icon"
      href="/assets/safari-pinned-tab.svg"
      color="#5bbad5"
    />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Inter font: Google Fonts CDN fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <!-- FlowX Design System: Open Sans (primary) + JetBrains Mono (monospace) -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <!-- PrimeNG 21: Theme provided via @primeuix/themes in main.ts, dark mode via CSS class toggle -->
    <!--
      Theme bootstrap — runs synchronously before Angular so the page
      paints in the right theme on the very first frame:
        1. Persisted choice in localStorage wins (set by the topbar toggle).
        2. Otherwise honour the OS `prefers-color-scheme`.
        3. Otherwise fall back to the default light class on <html>.
      AppComponent re-applies the same logic at runtime; this just removes
      the FOUC + the race where the OS preference paints before the
      stored override has had a chance to load.
    -->
    <script>
      (function () {
        try {
          var key = 'flowx-observatory.theme';
          var stored = null;
          try { stored = window.localStorage.getItem(key); } catch (_) {}
          var pref = (stored === 'dark' || stored === 'light')
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light');
          var root = document.documentElement;
          if (pref === 'dark') {
            root.classList.add('flowx-dark');
            root.classList.remove('flowx-light');
          } else {
            root.classList.add('flowx-light');
            root.classList.remove('flowx-dark');
          }
        } catch (_) { /* fail-open: keep default class on <html> */ }
      })();
    </script>
  </head>

  <body>
    <app-root></app-root>
  </body>
</html>
